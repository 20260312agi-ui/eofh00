<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로또 번호 추천기</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: #f4f6f8;
      margin: 0;
      padding: 50px 20px;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      transition: 0.3s;
    }

    button:hover {
      background: #45a049;
      transform: scale(1.05);
    }

    .container {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .set-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #555;
    }

    .numbers {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ball {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 16px;
    }

    /* 번호 색상 */
    .n1 { background: #fbc400; }
    .n2 { background: #69c8f2; }
    .n3 { background: #ff7272; }
    .n4 { background: #aaa; }
    .n5 { background: #b0d840; }
  </style>
</head>
<body>

  <h1>🎰 로또 번호 5세트 추천</h1>
  <button onclick="generateSets()">번호 뽑기</button>

  <div class="container" id="result"></div>

  <script>
    function getColorClass(num) {
      if (num <= 10) return 'n1';
      if (num <= 20) return 'n2';
      if (num <= 30) return 'n3';
      if (num <= 40) return 'n4';
      return 'n5';
    }

    function generateLotto() {
      let numbers = [];
      while (numbers.length < 6) {
        let num = Math.floor(Math.random() * 45) + 1;
        if (!numbers.includes(num)) {
          numbers.push(num);
        }
      }
      return numbers.sort((a, b) => a - b);
    }

    function generateSets() {
      const container = document.getElementById("result");
      container.innerHTML = "";

      for (let i = 1; i <= 5; i++) {
        let nums = generateLotto();

        let card = document.createElement("div");
        card.className = "card";

        let title = document.createElement("div");
        title.className = "set-title";
        title.innerText = i + "번 세트";

        let numberBox = document.createElement("div");
        numberBox.className = "numbers";

        nums.forEach(n => {
          let ball = document.createElement("div");
          ball.className = "ball " + getColorClass(n);
          ball.innerText = n;
          numberBox.appendChild(ball);
        });

        card.appendChild(title);
        card.appendChild(numberBox);
        container.appendChild(card);
      }
    }
  </script>

</body>
</html>
